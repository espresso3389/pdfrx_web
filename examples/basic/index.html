<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pdfrx-viewer example</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 6px 12px;
        background: #263238;
        color: #eceff1;
        font-size: 13px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex: none;
      }
      header input {
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 13px;
        width: 180px;
      }
      header button {
        all: unset;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.12);
      }
      header button:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      #main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #sidebar {
        width: 180px;
        flex: none;
        background: #37474f;
        color: #eceff1;
        display: flex;
        flex-direction: column;
        font-size: 12px;
      }
      #sidebar .tabs {
        display: flex;
        flex: none;
      }
      #sidebar .tabs button {
        all: unset;
        flex: 1;
        text-align: center;
        padding: 6px 0;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.25);
      }
      #sidebar .tabs button.active {
        background: transparent;
      }
      #sidebar .pane {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .thumb {
        display: block;
        margin: 0 auto 10px;
        cursor: pointer;
        border: 2px solid transparent;
        background: #fff;
      }
      .thumb.current {
        border-color: #4fc3f7;
      }
      .thumb-label {
        text-align: center;
        margin: -6px 0 8px;
        opacity: 0.7;
      }
      .outline-item {
        padding: 3px 0;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .outline-item:hover {
        color: #4fc3f7;
      }
      pdfrx-viewer {
        flex: 1;
        min-width: 0;
      }
      #searchStatus {
        min-width: 70px;
        text-align: center;
        opacity: 0.85;
      }
      #pageStatus {
        margin-left: auto;
        opacity: 0.85;
      }
      .sep {
        width: 1px;
        align-self: stretch;
        margin: 4px 2px;
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <header>
      <strong>pdfrx-viewer</strong>
      <button id="openFileBtn" title="Open a local PDF file">Open File</button>
      <button id="openUrlBtn" title="Open a PDF from a URL">Open URL</button>
      <input id="fileInput" type="file" accept="application/pdf,.pdf" style="display: none" />
      <input id="searchBox" type="search" placeholder="Search…" />
      <button id="searchPrev" title="Previous match">▲</button>
      <button id="searchNext" title="Next match">▼</button>
      <span id="searchStatus"></span>
      <button id="printBtn" title="Print">Print</button>
      <span class="sep"></span>
      <button id="fitPageBtn" title="Fit whole page">Fit Page</button>
      <button id="fitWidthBtn" title="Fit page width">Fit Width</button>
      <button id="fitHeightBtn" title="Fit page height">Fit Height</button>
      <button id="zoomOutBtn" title="Zoom out">−</button>
      <button id="zoomInBtn" title="Zoom in">+</button>
      <button id="overlayBtn" title="Toggle demo page overlays">Overlay: off</button>
      <span id="pageStatus"></span>
    </header>
    <div id="main">
      <div id="sidebar">
        <div class="tabs">
          <button id="tabThumbs" class="active">Pages</button>
          <button id="tabOutline">Outline</button>
        </div>
        <div class="pane" id="thumbsPane"></div>
        <div class="pane" id="outlinePane" style="display: none"></div>
      </div>
      <pdfrx-viewer id="viewer" src="hello.pdf" wasm-modules-url="pdfium/"></pdfrx-viewer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
