<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>pdfrx-viewer example</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* the viewer scrolls itself; never scroll the page */
      }
      header {
        padding: 6px 12px;
        background: #263238;
        color: #eceff1;
        font-size: 13px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex: none;
        flex-wrap: wrap;
      }
      header input {
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 13px;
        width: 180px;
        min-width: 0;
      }
      header button {
        all: unset;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.12);
        text-align: center;
      }
      header button:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      /* Buttons that only make sense on a narrow (drawer) layout. */
      #menuBtn,
      #moreBtn {
        display: none;
      }
      /* On wide screens the secondary tools just flow inline in the header. */
      #toolGroup {
        display: contents;
      }
      #main {
        flex: 1;
        display: flex;
        min-height: 0;
        position: relative;
      }
      #scrim {
        display: none;
      }
      #sidebar {
        width: 180px;
        flex: none;
        background: #37474f;
        color: #eceff1;
        display: flex;
        flex-direction: column;
        font-size: 12px;
      }
      #sidebar .tabs {
        display: flex;
        flex: none;
      }
      #sidebar .tabs button {
        all: unset;
        flex: 1;
        text-align: center;
        padding: 6px 0;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.25);
      }
      #sidebar .tabs button.active {
        background: transparent;
      }
      #sidebar .pane {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .thumb-item {
        position: relative;
        width: 130px;
        margin: 0 auto 10px;
        padding: 3px 0;
        /* Let the pane scroll vertically; a long press starts a reorder drag. */
        touch-action: pan-y;
        -webkit-user-select: none;
        user-select: none;
      }
      /* The item that follows the pointer while reordering. */
      #thumbGhost {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        opacity: 0.85;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        transform: translate(-50%, -50%);
      }
      .thumb-item.dragging {
        opacity: 0.4;
      }
      /* Insertion marker for drag & drop reordering. */
      .thumb-item.drop-before {
        box-shadow: 0 -3px 0 -1px #4fc3f7;
      }
      .thumb-item.drop-after {
        box-shadow: 0 3px 0 -1px #4fc3f7;
      }
      .thumb {
        display: block;
        cursor: pointer;
        border: 2px solid transparent;
        background: #fff;
      }
      .thumb.current {
        border-color: #4fc3f7;
      }
      .thumb-label {
        text-align: center;
        margin-top: 2px;
        opacity: 0.7;
      }
      .thumb-tools {
        position: absolute;
        right: 2px;
        bottom: 18px;
        display: flex;
        gap: 3px;
        opacity: 0;
        transition: opacity 0.12s;
      }
      .thumb-item:hover .thumb-tools {
        opacity: 1;
      }
      .thumb-tools button {
        all: unset;
        width: 20px;
        height: 20px;
        line-height: 20px;
        text-align: center;
        border-radius: 4px;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.65);
        color: #eceff1;
        font-size: 12px;
      }
      .thumb-tools button:hover {
        background: #4fc3f7;
        color: #263238;
      }
      .thumb-tools button.danger:hover {
        background: #ef5350;
        color: #fff;
      }
      .outline-item {
        padding: 3px 0;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .outline-item:hover {
        color: #4fc3f7;
      }
      pdfrx-viewer {
        flex: 1;
        min-width: 0;
      }
      #searchStatus {
        min-width: 70px;
        text-align: center;
        opacity: 0.85;
      }
      #selStatus {
        margin-left: auto;
        max-width: 260px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.85;
      }
      #pageStatus {
        margin-left: 12px;
        opacity: 0.85;
      }
      .sep {
        width: 1px;
        align-self: stretch;
        margin: 4px 2px;
        background: rgba(255, 255, 255, 0.2);
      }
      /* While a document opens, the chrome would act on a document that is
         about to be replaced. The viewer paints its own spinner over the pages. */
      body.loading header button,
      body.loading #searchBox,
      body.loading #sidebar {
        opacity: 0.5;
        pointer-events: none;
      }

      /* Touch devices have no hover, so the per-page tools must stay visible
         and be large enough to hit. */
      @media (hover: none) {
        .thumb-tools {
          opacity: 1;
        }
        .thumb-tools button {
          width: 30px;
          height: 30px;
          line-height: 30px;
          font-size: 15px;
        }
      }

      /* --- Narrow layout: off-canvas sidebar + collapsible toolbar --- */
      @media (max-width: 780px) {
        header {
          gap: 6px;
          padding: 6px 8px;
        }
        header button {
          padding: 8px 10px;
          min-width: 24px;
        }
        #menuBtn,
        #moreBtn {
          display: block;
          font-size: 16px;
          padding: 8px 12px;
        }
        #brand,
        #selStatus {
          display: none;
        }
        #searchBox {
          flex: 1;
          width: auto;
          padding: 8px;
          /* < 16px makes iOS Safari zoom the page when the field is focused. */
          font-size: 16px;
        }
        /* Secondary tools become a second row, revealed by the ⋯ button. */
        #toolGroup {
          display: none;
          flex-basis: 100%;
          flex-wrap: wrap;
          gap: 6px;
          padding-top: 6px;
          border-top: 1px solid rgba(255, 255, 255, 0.15);
        }
        header.tools-open #toolGroup {
          display: flex;
        }
        #toolGroup .sep {
          display: none;
        }
        #sidebar {
          position: absolute;
          z-index: 5;
          top: 0;
          bottom: 0;
          left: 0;
          width: 200px;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
          box-shadow: 2px 0 12px rgba(0, 0, 0, 0.4);
        }
        #main.sidebar-open #sidebar {
          transform: none;
        }
        #main.sidebar-open #scrim {
          display: block;
          position: absolute;
          inset: 0;
          z-index: 4;
          background: rgba(0, 0, 0, 0.45);
        }
        #sidebar .tabs button {
          padding: 12px 0;
        }
        .outline-item {
          padding: 10px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <button id="menuBtn" title="Show pages / outline" aria-label="Toggle sidebar">☰</button>
      <strong id="brand">pdfrx-viewer</strong>
      <input id="fileInput" type="file" accept="application/pdf,.pdf" style="display: none" />
      <input id="searchBox" type="search" placeholder="Search…" />
      <button id="searchPrev" title="Previous match">▲</button>
      <button id="searchNext" title="Next match">▼</button>
      <span id="searchStatus"></span>
      <span id="pageStatus"></span>
      <button id="moreBtn" title="More tools" aria-label="More tools">⋯</button>
      <div id="toolGroup">
        <button id="openFileBtn" title="Open a local PDF file">Open File</button>
        <button id="openUrlBtn" title="Open a PDF from a URL">Open URL</button>
        <button id="printBtn" title="Print">Print</button>
        <button id="saveBtn" title="Download the edited PDF">Save</button>
        <span class="sep"></span>
        <button id="fitPageBtn" title="Fit whole page">Fit Page</button>
        <button id="fitWidthBtn" title="Fit page width">Fit Width</button>
        <button id="fitHeightBtn" title="Fit page height">Fit Height</button>
        <button id="zoomOutBtn" title="Zoom out">−</button>
        <button id="zoomInBtn" title="Zoom in">+</button>
        <button id="overlayBtn" title="Toggle demo page overlays">Overlay: off</button>
        <button id="layoutBtn" title="Toggle scroll direction">Layout: vertical</button>
      </div>
      <span id="selStatus"></span>
    </header>
    <div id="main">
      <div id="scrim"></div>
      <div id="sidebar">
        <div class="tabs">
          <button id="tabThumbs" class="active">Pages</button>
          <button id="tabOutline">Outline</button>
        </div>
        <div class="pane" id="thumbsPane"></div>
        <div class="pane" id="outlinePane" style="display: none"></div>
      </div>
      <pdfrx-viewer id="viewer" src="hello.pdf" wasm-modules-url="pdfium/"></pdfrx-viewer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
