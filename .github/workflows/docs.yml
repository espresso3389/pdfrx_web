name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Builds packages, TypeDoc API reference, and the static-host-compatible
      # examples, then assembles them into docs-site/. The colab example needs
      # its reference WebSocket relay and is intentionally local-only.
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
